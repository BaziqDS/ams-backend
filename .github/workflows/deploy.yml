name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - name: Stop services
        run: |
          nssm stop AMSBackend -ErrorAction SilentlyContinue
          nssm stop AMSFrontend -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create logs directory
        run: |
          if (-not (Test-Path "logs")) { New-Item -ItemType Directory -Path "logs" }

      - name: Install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install -r requirements.txt

      - name: Create environment file
        run: |
          Set-Content -Path .env -Value "ENVIRONMENT=production"
          Add-Content -Path .env -Value "SECRET_KEY=${{ secrets.SECRET_KEY }}"
          Add-Content -Path .env -Value "DB_NAME=${{ secrets.DB_NAME }}"
          Add-Content -Path .env -Value "DB_USER=${{ secrets.DB_USER }}"
          Add-Content -Path .env -Value "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          Add-Content -Path .env -Value "DB_HOST=${{ secrets.DB_HOST }}"
          Add-Content -Path .env -Value "DB_PORT=${{ secrets.DB_PORT }}"
          Add-Content -Path .env -Value "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}"
          Add-Content -Path .env -Value "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}"
          Add-Content -Path .env -Value "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"

      - name: Run migrations
        run: |
          & .\venv\Scripts\python.exe manage.py migrate --noinput

      - name: Collect static files
        run: |
          & .\venv\Scripts\python.exe manage.py collectstatic --noinput

      - name: Restart backend service
        run: |
          $service = Get-Service -Name AMSBackend -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Host "Creating AMSBackend service..."
            nssm install AMSBackend "$PWD\venv\Scripts\python.exe" "$PWD\manage.py runserver 0.0.0.0:8000"
            nssm set AMSBackend AppDirectory "$PWD"
            nssm set AMSBackend AppStdout "$PWD\logs\backend.log"
            nssm set AMSBackend AppStderr "$PWD\logs\backend-error.log"
            nssm set AMSBackend Start SERVICE_AUTO_START
          } else {
            nssm stop AMSBackend
            Start-Sleep -Seconds 3
          }
          nssm start AMSBackend
        continue-on-error: true

      - name: Verify service
        run: |
          Start-Sleep -Seconds 5
          $response = curl.exe -s -o nul -w "%{http_code}" http://localhost:8000/admin/login/ -ErrorAction SilentlyContinue
          if ($response -eq "200" -or $response -eq "302" -or $response -eq "401") {
            Write-Host "Backend is running!"
          } else {
            Write-Host "Backend may not be ready yet"
          }

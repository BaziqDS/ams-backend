name: Deploy to Production
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - name: Stop backend service before checkout
        run: |
          $service = Get-Service -Name AMSBackend -ErrorAction SilentlyContinue
          if ($service) {
            nssm stop AMSBackend
            Start-Sleep -Seconds 2
          }
          taskkill /F /IM python.exe /T 2>$null
          Start-Sleep -Seconds 2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create logs directory
        run: |
          if (-not (Test-Path "logs")) { New-Item -ItemType Directory -Path "logs" }

      - name: Install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install -r requirements.txt
          .\venv\Scripts\pip.exe install waitress

      - name: Create environment file
        run: |
          $lines = @(
            "ENVIRONMENT=production",
            "SECRET_KEY=${{ secrets.SECRET_KEY }}",
            "DB_NAME=${{ secrets.DB_NAME }}",
            "DB_USER=${{ secrets.DB_USER }}",
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}",
            "DB_HOST=${{ secrets.DB_HOST }}",
            "DB_PORT=${{ secrets.DB_PORT }}",
            "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}",
            "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}",
            "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
          )
          $lines | Out-File -FilePath .env -Encoding utf8 -Force

      - name: Run migrations
        run: |
          & .\venv\Scripts\python.exe manage.py migrate --noinput

      - name: Collect static files
        run: |
          & .\venv\Scripts\python.exe manage.py collectstatic --noinput

      - name: Stop backend service
        run: |
          $service = Get-Service -Name AMSBackend -ErrorAction SilentlyContinue
          if ($service) {
            nssm stop AMSBackend
            Start-Sleep -Seconds 5
          }

      - name: Deploy backend service
        run: |
          $appDir = (Resolve-Path ".").Path
          $pythonExe = "$appDir\venv\Scripts\python.exe"

          $service = Get-Service -Name AMSBackend -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Host "Creating AMSBackend service..."
            nssm install AMSBackend $pythonExe "-m waitress --port=8000 --threads=4 yourproject.wsgi:application"
            nssm set AMSBackend AppDirectory $appDir
            nssm set AMSBackend AppEnvironmentExtra "PATH=$appDir\venv\Scripts;$env:PATH"
            nssm set AMSBackend AppStdout "$appDir\logs\backend.log"
            nssm set AMSBackend AppStderr "$appDir\logs\backend-error.log"
            nssm set AMSBackend AppRotateFiles 1
            nssm set AMSBackend AppRotateBytes 10485760
            nssm set AMSBackend Start SERVICE_AUTO_START
          } else {
            Write-Host "Updating existing AMSBackend service..."
            nssm set AMSBackend Application $pythonExe
            nssm set AMSBackend AppParameters "-m waitress --port=8000 --threads=4 yourproject.wsgi:application"
            nssm set AMSBackend AppDirectory $appDir
          }

          nssm start AMSBackend
          Write-Host "AMSBackend started."

      - name: Health check
        run: |
          Write-Host "Waiting for service to initialize..."
          Start-Sleep -Seconds 10

          $maxRetries = 5
          $retryDelay = 5
          $success = $false

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8000/health/" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed on attempt $i."
                $success = $true
                break
              }
            } catch {
              Write-Host "Attempt $i failed: $_"
              Start-Sleep -Seconds $retryDelay
            }
          }

          if (-not $success) {
            Write-Host "Health check failed after $maxRetries attempts. Dumping logs..."
            Get-Content "logs\backend-error.log" -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }
